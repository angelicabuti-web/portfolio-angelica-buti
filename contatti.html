<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

<body>

  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="cv.html">CV</a>
      <a href="contatti.html">Contatti</a>
    </nav>
  </header>

  <main>

    <section>
      <h1>Contattami</h1>

      <p>
        Vuoi conoscermi meglio o parlarmi di un progetto?
        Compila il modulo e inviami un messaggio.
      </p>
    </section>

    <section>
      <h2>Invia un messaggio</h2>

      <form action="#" method="post">

        <div>
          <label for="nome">Nome e cognome</label>

          <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Inserisci il tuo nome"
            required
          >
        </div>

        <div>
          <label for="email">Email</label>

          <input
            type="email"
            id="email"
            name="email"
            placeholder="Inserisci la tua email"
            required
          >
        </div>

        <div>
          <label for="oggetto">Oggetto</label>

          <input
            type="text"
            id="oggetto"
            name="oggetto"
            placeholder="Scrivi l'oggetto del messaggio"
            required
          >
        </div>

        <div>
          <label for="messaggio">Messaggio</label>

          <textarea
            id="messaggio"
            name="messaggio"
            rows="7"
            placeholder="Scrivi qui il tuo messaggio"
            required
          ></textarea>
        </div>

        <button type="submit">Invia messaggio</button>

      </form>
    </section>

  </main>

  <footer>
    <p>© 2026 Angelica Buti</p>
  </footer>

</body>
</html>
